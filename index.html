<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeslaSys Chile - Sistema de Soporte</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="scrollbar.css" />
    <link rel="icon" type="image/png" href="img/favicon.png" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="main.js"></script>
  </head>
  <body>
    <header>
      <img src="img/logo.png" alt="Logo TeslaSys Chile" />
      <h1>Sistema de Registro de Solicitudes de Soporte</h1>
      <h2>
        <i data-lucide="headset"></i>
        Soporte TI
      </h2>
    </header>
    <main>
      <section>
        <h3>
          <i data-lucide="clipboard-list"></i>
          Solicitudes Registradas
        </h3>
        <table>
          <thead>
            <tr>
              <th>N°</th>
              <th>Nombre</th>
              <th>Área</th>
              <th>Tipo de Solicitud</th>
              <th>Descripción</th>
            </tr>
          </thead>
          <tbody id="tablaSolicitudes"></tbody>
        </table>
      </section>
      <section class="formulario">
        <h3>
          <i data-lucide="file-text"></i>
          Formulario de Solicitud
        </h3>
        <form id="formulario">
          <label for="nombre">
            <i data-lucide="user"></i>
            Nombre del colaborador
          </label>
          <input type="text" id="nombre" placeholder="Ingrese su nombre" />
          <label for="correo">
            <i data-lucide="mail"></i>
            Correo electrónico
          </label>
          <input type="email" id="correo" placeholder="ejemplo@teslasys.cl" />
          <label for="area">
            <i data-lucide="building"></i>
            Área de trabajo
          </label>
          <input type="text" id="area" placeholder="Ej: Finanzas" />
          <label for="tipo">
            <i data-lucide="list"></i>
            Tipo de solicitud
          </label>
          <select id="tipo">
            <option value="">Seleccione una opción</option>
            <option value="Hardware">Hardware</option>
            <option value="Software">Software</option>
            <option value="Redes">Redes</option>
            <option value="Seguridad">Seguridad</option>
          </select>
          <label for="descripcion">
            <i data-lucide="message-square"></i>
            Descripción del problema
          </label>
          <textarea id="descripcion" placeholder="Describa el problema presentado"></textarea>
          <button type="button" onclick="registrarSolicitud()">
            <i data-lucide="plus-circle"></i>
            Registrar Solicitud
          </button>
          <button type="button" onclick="limpiarFormulario()">
            <i data-lucide="eraser"></i>
            Limpiar Formulario
          </button>
        </form>
        <div id="mensaje"></div>
      </section>
    </main>
    <footer>
      <p>
        <i data-lucide="copyright"></i>
        2026 TeslaSys Chile
      </p>
      <p>
        <i data-lucide="shield-check"></i>
        Sistema de Registro de Solicitudes de Soporte
      </p>
      <p>
        <i data-lucide="code"></i>
        Desarrollo Frontend - Evaluación Sumativa 2
      </p>
    </footer>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
